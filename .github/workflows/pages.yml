name: Deploy site, demo, gallery, and book to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Run the JavaScript actions on Node 24 (Node 20 is being retired).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs rust, wasm-bindgen, wasm-opt, and trunk as pinned in mise.toml.
      - uses: jdx/mise-action@v2

      # mise delegates rust to rustup, which does not pick up the target on a
      # machine that already has rust, so add it explicitly.
      - run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build and optimize the demo worker wasm
        run: |
          cargo build --release -p worker --target wasm32-unknown-unknown
          wasm-bindgen --target web --out-dir examples/nightshade_demo/runtime --out-name engine target/wasm32-unknown-unknown/release/worker.wasm
          wasm-opt -O3 --enable-simd examples/nightshade_demo/runtime/engine_bg.wasm -o examples/nightshade_demo/runtime/engine_bg.wasm

      # The musaic-built landing page is served at the project root, /musaic/.
      # Built first, since trunk clears its dist dir and the others nest under it.
      - name: Build the landing showcase
        run: trunk build --release --config examples/landing/Trunk.toml --public-url /musaic/ --dist "$GITHUB_WORKSPACE/site"

      # The full app demo is served at /musaic/demo/.
      - name: Build the demo bundle
        run: trunk build --release --public-url /musaic/demo/ --dist "$GITHUB_WORKSPACE/site/demo"

      # The interactive component gallery is served at /musaic/gallery/.
      - name: Build the gallery bundle
        run: trunk build --release --config examples/gallery/Trunk.toml --public-url /musaic/gallery/ --dist "$GITHUB_WORKSPACE/site/gallery"

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.52"

      # The guide book is served at /musaic/book/.
      - name: Build the book
        run: mdbook build docs/book --dest-dir "$GITHUB_WORKSPACE/site/book"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
